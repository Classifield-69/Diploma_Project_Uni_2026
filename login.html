<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmSight — Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <!-- Общи стилове (nav, footer, fonts) -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Стилове за login и register -->
    <link rel="stylesheet" href="/css/auth.css">
    <script src="/js/api.js" defer></script>
    <script src="/js/header.js" defer></script>
    <script src="/js/auth.js" defer></script>
</head>
<body>

    <!-- ── HEADER ── -->
    <header class="site-header">
        <!-- header.js рендира nav динамично според auth state -->
        <div class="nav-tagline">Филмово AI списание</div>
    </header>

    <!-- ── MAIN ── -->
    <main class="main-content auth-main">
        <div class="auth-card">

            <div class="auth-card-header">
                <div class="auth-logo">FilmSight</div>
                <p class="auth-subtitle">Влез в своя акаунт</p>
            </div>

            <!--
                Няма action или method – submit-ът се обработва от auth.js.
                <form> вместо <div> заради Enter, accessibility и password managers.
            -->
            <form id="login-form" class="auth-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Имейл</label>
                    <input
                        class="form-input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@mail.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Парола</label>
                    <input
                        class="form-input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <!-- auth.js попълва статус съобщението -->
                <p id="status" class="auth-status"></p>

                <button type="submit" class="auth-btn">Вход</button>
            </form>

            <p class="auth-link">
                Нямаш акаунт? <a href="/register">Регистрирай се</a>
            </p>

        </div>
    </main>

    <!-- ── FOOTER ── -->
    <footer class="site-footer">
        <span>© 2026 FilmSight · Всички права запазени</span>
    </footer>

</body>
</html>
